name: Rice Disease API CI/CD

on:
  push:
    branches:
      - main
  pull_request:
    branches:
      - main

jobs:
  test-and-build:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.10"

      - name: Install dependencies
        run: |
          pip install torch torchvision --index-url https://download.pytorch.org/whl/cpu
          pip install fastapi uvicorn pillow python-multipart numpy pytest httpx

      - name: Run tests
        run: pytest tests/ -v

      - name: Build Docker image
        run: docker build -t rice-disease-api .
